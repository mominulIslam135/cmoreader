<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Customer Number Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        .app {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 0 4px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }
        .header .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #00e676;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* Camera */
        .camera-card {
            background: #1a1d27;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            border: 1px solid #2a2d3a;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 260px;
            background: #000;
        }
        video {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        /* Overlay corners */
        .overlay {
            position: absolute; inset: 0;
            pointer-events: none;
        }
        .scan-zone {
            position: absolute;
            top: 30%; left: 8%;
            width: 84%; height: 32%;
            border: 2px solid transparent;
        }
        .scan-zone::before, .scan-zone::after,
        .scan-zone .c3, .scan-zone .c4 {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            border-color: #00e676;
            border-style: solid;
        }
        .scan-zone::before { top:-2px; left:-2px; border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
        .scan-zone::after  { top:-2px; right:-2px; border-width: 3px 3px 0 0; border-radius: 0 3px 0 0; }
        .scan-zone .c3     { bottom:-2px; left:-2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 3px; }
        .scan-zone .c4     { bottom:-2px; right:-2px; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }
        .scan-label {
            position: absolute;
            top: calc(30% - 26px);
            left: 8%;
            font-size: 10px;
            font-weight: 700;
            color: #00e676;
            letter-spacing: 1.5px;
            background: rgba(0,0,0,0.65);
            padding: 3px 8px;
            border-radius: 4px;
        }
        /* Scanning animation line */
        .scan-line {
            position: absolute;
            top: 30%; left: 8%; width: 84%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00e676, transparent);
            animation: scanMove 2s linear infinite;
            opacity: 0;
        }
        .scan-line.active { opacity: 1; }
        @keyframes scanMove {
            0%  { top: 30%; }
            100% { top: 62%; }
        }
        /* Dark mask around scan zone */
        .mask-top    { position: absolute; top:0; left:0; right:0; height:30%; background: rgba(0,0,0,0.55); }
        .mask-bottom { position: absolute; bottom:0; left:0; right:0; height:38%; background: rgba(0,0,0,0.55); }
        .mask-left   { position: absolute; top:30%; left:0; width:8%; height:32%; background: rgba(0,0,0,0.55); }
        .mask-right  { position: absolute; top:30%; right:0; width:8%; height:32%; background: rgba(0,0,0,0.55); }

        /* Status */
        .status-pill {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 50px;
            padding: 10px 18px;
            font-size: 13px; font-weight: 600;
            min-height: 42px;
            transition: border-color 0.3s, color 0.3s;
        }
        .status-pill.ready   { color: #90caf9; border-color: #1565c0; }
        .status-pill.success { color: #69f0ae; border-color: #00c853; }
        .status-pill.error   { color: #ff8a80; border-color: #c62828; }
        .status-pill.warn    { color: #ffd54f; border-color: #f57f17; }
        .status-icon { font-size: 16px; }

        /* Last Detected */
        .last-detected {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 14px 18px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .last-detected .label { font-size: 11px; color: #777; letter-spacing: 1px; text-transform: uppercase; }
        .last-detected .number { font-size: 26px; font-weight: 800; color: #00e676; letter-spacing: 3px; font-family: monospace; }
        .last-detected .count-info { text-align: right; }
        .last-detected .total-count { font-size: 28px; font-weight: 800; color: #ffffff; }

        /* Buttons */
        .btn-row { display: flex; gap: 10px; }
        .btn {
            flex: 1; padding: 14px;
            font-size: 14px; font-weight: 700;
            border: none; border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-export { background: #00897b; color: #fff; }
        .btn-export:hover { background: #00796b; }
        .btn-reset  { background: #c62828; color: #fff; }
        .btn-reset:hover  { background: #b71c1c; }

        /* Table */
        .logs-card {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 16px;
            overflow: hidden;
        }
        .logs-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid #2a2d3a;
        }
        .logs-header h3 { font-size: 14px; color: #aaa; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .badge {
            background: #263238;
            color: #80cbc4;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
        }
        .table-scroll { max-height: 260px; overflow-y: auto; }
        .table-scroll::-webkit-scrollbar { width: 4px; }
        .table-scroll::-webkit-scrollbar-track { background: #1a1d27; }
        .table-scroll::-webkit-scrollbar-thumb { background: #37474f; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: 10px 14px;
            text-align: left;
            font-size: 11px;
            color: #546e7a;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: #1a1d27;
            position: sticky; top: 0;
            border-bottom: 1px solid #2a2d3a;
        }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: #1e2230; }
        tbody td {
            padding: 11px 14px;
            font-size: 14px;
            border-bottom: 1px solid #1e2332;
            color: #ccc;
        }
        tbody td.num-cell {
            font-family: monospace;
            font-size: 15px;
            font-weight: 700;
            color: #e0e0e0;
            letter-spacing: 2px;
        }
        tbody td[contenteditable="true"]:focus {
            outline: 2px solid #00897b;
            background: #102a27;
            border-radius: 4px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #37474f;
            font-size: 14px;
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 8px; }

        canvas { display: none; }
    </style>
</head>
<body>
<div class="app">

    <div class="header">
        <div class="dot" id="status-dot"></div>
        <h1>Customer No. Scanner</h1>
    </div>

    <div class="camera-card">
        <div class="video-wrapper">
            <video id="webcam" autoplay playsinline muted></video>
            <div class="overlay">
                <div class="mask-top"></div>
                <div class="mask-bottom"></div>
                <div class="mask-left"></div>
                <div class="mask-right"></div>
                <div class="scan-zone"><span class="c3"></span><span class="c4"></span></div>
                <div class="scan-label">ALIGN 8-DIGIT NUMBER</div>
                <div class="scan-line" id="scan-line"></div>
            </div>
        </div>
    </div>

    <div class="status-pill ready" id="status-pill">
        <span class="status-icon">📷</span>
        <span id="status-text">Initializing camera...</span>
    </div>

    <div class="last-detected" id="last-detected-card">
        <div>
            <div class="label">Last Detected</div>
            <div class="number" id="last-number">— — — — — — — —</div>
        </div>
        <div class="count-info">
            <div class="label">Scanned</div>
            <div class="total-count" id="total-count">0</div>
        </div>
    </div>

    <div class="btn-row">
        <button class="btn btn-export" onclick="exportData()">⬇ Export Excel</button>
        <button class="btn btn-reset"  onclick="resetSession()">🗑 Clear All</button>
    </div>

    <div class="logs-card">
        <div class="logs-header">
            <h3>Scan Logs</h3>
            <span class="badge" id="counter">0 records</span>
        </div>
        <div class="table-scroll">
            <table>
                <thead>
                    <tr>
                        <th style="width:12%">#</th>
                        <th style="width:50%">Customer Number</th>
                        <th style="width:38%">Time</th>
                    </tr>
                </thead>
                <tbody id="log-body">
                    <tr class="empty-row">
                        <td colspan="3">
                            <div class="empty-state">
                                <div class="icon">🔍</div>
                                Point camera at an 8-digit customer number
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
<canvas id="proc-canvas"></canvas>

<script>
const webcam       = document.getElementById('webcam');
const canvas       = document.getElementById('proc-canvas');
const statusPill   = document.getElementById('status-pill');
const statusText   = document.getElementById('status-text');
const lastNumber   = document.getElementById('last-number');
const totalCount   = document.getElementById('total-count');
const logBody      = document.getElementById('log-body');
const counter      = document.getElementById('counter');
const scanLine     = document.getElementById('scan-line');

let dataset = [];
let busy = false;
let ocrReady = false;
let worker = null;

// ─── Helpers ───────────────────────────────────────
function setStatus(msg, type='ready', icon='📷') {
    statusPill.className = 'status-pill ' + type;
    statusText.textContent = msg;
    statusPill.querySelector('.status-icon').textContent = icon;
}

// ─── Init OCR Worker ───────────────────────────────
async function initOCR() {
    try {
        if (typeof Tesseract === 'undefined') {
            throw new Error('Tesseract.js script did not load — check network/CDN access.');
        }
        worker = await Tesseract.createWorker('eng', 1, {
            logger: () => {},
            errorHandler: (err) => console.error('Tesseract worker error:', err),
        });
        await worker.setParameters({
            tessedit_char_whitelist: '0123456789',
            tessedit_pageseg_mode: '7',
        });
        ocrReady = true;
        setStatus('Ready — scanning for 8-digit numbers', 'ready', '🟢');
        scanLine.classList.add('active');
        setInterval(doScan, 1000);
    } catch(e) {
        const msg = e instanceof Error
            ? e.message
            : (typeof e === 'string' ? e : JSON.stringify(e));
        console.error('OCR init failed:', e);
        setStatus('OCR init failed: ' + (msg || 'unknown error'), 'error', '❌');
    }
}

// ─── Camera ────────────────────────────────────────
async function initCamera() {
    setStatus('Requesting camera access...', 'warn', '⏳');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: {ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} }
        });
        webcam.srcObject = stream;
        webcam.onloadedmetadata = () => {
            setStatus('Camera ready, loading OCR engine...', 'warn', '⏳');
            initOCR();
        };
    } catch(e) {
        setStatus('Camera access denied. Please allow camera permission.', 'error', '🚫');
    }
}

// ─── Scan Frame ────────────────────────────────────
async function doScan() {
    if (busy || !ocrReady || webcam.videoWidth === 0) return;
    busy = true;

    const ctx = canvas.getContext('2d');
    const vW = webcam.videoWidth;
    const vH = webcam.videoHeight;
    canvas.width  = vW;
    canvas.height = vH;

    // Crop the scan zone (matches CSS: top 30%, left 8%, width 84%, height 32%)
    const sx = vW * 0.08, sy = vH * 0.30;
    const sw = vW * 0.84, sh = vH * 0.32;

    // Draw cropped area
    canvas.width = sw; canvas.height = sh;
    ctx.drawImage(webcam, sx, sy, sw, sh, 0, 0, sw, sh);

    // Preprocess: grayscale + contrast boost + binarize
    const imgData = ctx.getImageData(0, 0, sw, sh);
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
        // Grayscale
        let g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
        // Contrast stretch
        g = Math.min(255, Math.max(0, (g - 100) * 1.8 + 100));
        // Otsu-like threshold at 128
        const v = g < 128 ? 0 : 255;
        d[i] = d[i+1] = d[i+2] = v;
    }
    ctx.putImageData(imgData, 0, 0);

    try {
        const { data: { text } } = await worker.recognize(canvas);
        const clean = text.replace(/\s+/g, '');
        const match = clean.match(/\d{8}/);

        if (match) {
            const num = match[0];
            if (!dataset.includes(num)) {
                addRecord(num);
                setStatus(`✅ Captured: ${num}`, 'success', '✅');
                setTimeout(() => setStatus('Ready — scanning for 8-digit numbers', 'ready', '🟢'), 2000);
            }
        }
    } catch(e) {
        console.warn('OCR error:', e);
    }
    busy = false;
}

// ─── Add Record ────────────────────────────────────
function addRecord(num) {
    const now = new Date();
    const time = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    dataset.push({ num, time });

    // Remove empty state row
    const empty = logBody.querySelector('.empty-row');
    if (empty) empty.remove();

    const idx = dataset.length;
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td>${idx}</td>
        <td class="num-cell" contenteditable="true"
            onblur="updateRecord(${idx-1}, this.innerText)">${num}</td>
        <td>${time}</td>
    `;
    logBody.prepend(tr); // newest on top

    lastNumber.textContent = num;
    totalCount.textContent = dataset.length;
    counter.textContent = dataset.length + (dataset.length === 1 ? ' record' : ' records');
}

// ─── Edit Record ───────────────────────────────────
function updateRecord(i, val) {
    dataset[i].num = val.trim();
}

// ─── Export ────────────────────────────────────────
function exportData() {
    if (dataset.length === 0) {
        alert('No records to export yet.');
        return;
    }
    const rows = dataset.map((r, i) => ({
        'Serial No': i + 1,
        'Customer Number': r.num,
        'Scan Time': r.time
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    // Column widths
    ws['!cols'] = [{wch:10},{wch:20},{wch:15}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Scan Records');
    const date = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `Customer_Numbers_${date}.xlsx`);
}

// ─── Reset ─────────────────────────────────────────
function resetSession() {
    if (!confirm('Clear all scanned records?')) return;
    dataset = [];
    logBody.innerHTML = `
        <tr class="empty-row">
            <td colspan="3">
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    Point camera at an 8-digit customer number
                </div>
            </td>
        </tr>`;
    lastNumber.textContent = '— — — — — — — —';
    totalCount.textContent = '0';
    counter.textContent = '0 records';
}

// ─── Boot ──────────────────────────────────────────
window.onload = initCamera;
</script>
</body>
</html>
